context:
  version: "3.1.2"

package:
  name: erdtree
  version: ${{ version }}

source:
  url: https://github.com/solidiquis/erdtree/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1758e7ad8f7be59bc3c6bda8b058097509f9db6f40ad57c4b0b361e3be439297

build:
  number: 1
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - cargo auditable install --no-track --locked --bins --all-features --root ${{ PREFIX }} --path .
          # generate shell completions
          - mkdir -p $PREFIX/share/bash-completion/completions $PREFIX/share/zsh/site-functions $PREFIX/share/fish/vendor_completions.d
          - $PREFIX/bin/erd --completions=bash > $PREFIX/share/bash-completion/completions/erd
          - $PREFIX/bin/erd --completions=zsh > $PREFIX/share/zsh/site-functions/_erd
          - $PREFIX/bin/erd --completions=fish > $PREFIX/share/fish/vendor_completions.d/erd.fish
        else:
          - cargo auditable install --no-track --locked --bins --all-features --root %LIBRARY_PREFIX% --path .
          # generate shell completions
          - mkdir %LIBRARY_PREFIX%\share\bash-completion\completions
          - mkdir %LIBRARY_PREFIX%\share\zsh\site-functions
          - mkdir %LIBRARY_PREFIX%\share\fish\vendor_completions.d
          - mkdir %LIBRARY_PREFIX%\share\powershell\Modules\erd
          - '%LIBRARY_BIN%\erd.exe --completions=bash > %LIBRARY_PREFIX%\share\bash-completion\completions\erd'
          - '%LIBRARY_BIN%\erd.exe --completions=zsh > %LIBRARY_PREFIX%\share\zsh\site-functions\_erd'
          - '%LIBRARY_BIN%\erd.exe --completions=fish > %LIBRARY_PREFIX%\share\fish\vendor_completions.d\erd.fish'
          - '%LIBRARY_BIN%\erd.exe --completions=powershell > %LIBRARY_PREFIX%\share\powershell\Modules\erd\erd.psm1'
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml
  skip:
    - win

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - erd --help
      - erd --version
  - package_contents:
      bin:
        - erd
      files:
        - if: unix
          then:
            - share/bash-completion/completions/erd
            - share/fish/vendor_completions.d/erd.fish
            - share/zsh/site-functions/_erd
        - if: win
          then:
            - Library/share/bash-completion/completions/erd
            - Library/share/fish/vendor_completions.d/erd.fish
            - Library/share/zsh/site-functions/_erd
            - Library/share/powershell/Modules/erd/erd.psm1
      strict: true

about:
  homepage: https://github.com/solidiquis/erdtree
  repository: https://github.com/solidiquis/erdtree
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: A modern, cross-platform, multi-threaded, and general purpose filesystem and disk-usage utility.
  description: |
    erdtree (erd) is a cross-platform, multi-threaded, and general purpose
    filesystem and disk usage utility that is aware of .gitignore and hidden file rules.

extra:
  recipe-maintainers:
    - salim-b
